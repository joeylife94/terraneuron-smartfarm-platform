spring.application.name=terra-ops
server.port=8080

# Kafka Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=terra-ops-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.LinkedHashMap
# Existing committed offsets still take precedence. New groups start at the oldest available record
# so events published during service startup are not silently skipped.
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=record

# Retry each failed listener record twice with a fixed backoff, then publish to <source-topic>.DLT
app.kafka.retry.backoff-ms=1000
app.kafka.retry.max-retries=2

# Kafka Producer (for command topic)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka Topics
kafka.topic.processed-insights=processed-insights
kafka.topic.action-plans=action-plans
kafka.topic.control-command=terra.control.command
kafka.topic.control-feedback=terra.control.feedback

# MySQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/terra_ops}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:terra}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:terra2025}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway owns schema changes. Version 0 is reserved for adopting existing
# pre-Flyway Terra-Ops databases without dropping or recreating application data.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JPA validates the migrated schema and must never mutate it at runtime.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Security Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

# Scheduling (for plan expiration)
spring.task.scheduling.pool.size=2
