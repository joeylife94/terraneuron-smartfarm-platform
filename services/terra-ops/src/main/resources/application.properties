spring.application.name=terra-ops
server.port=8080

# Kafka Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=terra-ops-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.LinkedHashMap
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=record
app.kafka.retry.backoff-ms=1000
app.kafka.retry.max-retries=2

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

kafka.topic.processed-insights=processed-insights
kafka.topic.action-plans=action-plans
kafka.topic.control-command=terra.control.command
kafka.topic.control-feedback=terra.control.feedback

# MySQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/terra_ops}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:terra}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:terra2025}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# User JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Terra-Ops -> Terra-Sense device safety service JWT and bounded HTTP timeouts.
device-safety.client.base-url=${TERRA_SENSE_URL:http://localhost:8081}
device-safety.client.connect-timeout-ms=${DEVICE_SAFETY_CONNECT_TIMEOUT_MS:500}
device-safety.client.read-timeout-ms=${DEVICE_SAFETY_READ_TIMEOUT_MS:1000}
device-safety.client.jwt.secret=${DEVICE_SAFETY_JWT_SECRET}
device-safety.client.jwt.issuer=${DEVICE_SAFETY_JWT_ISSUER:terraneuron-internal}
device-safety.client.jwt.subject=${DEVICE_SAFETY_JWT_SUBJECT:terra-ops}
device-safety.client.jwt.audience=${DEVICE_SAFETY_JWT_AUDIENCE:terra-sense}
device-safety.client.jwt.scope=${DEVICE_SAFETY_JWT_SCOPE:device:safety:evaluate}
device-safety.client.jwt.lifetime-seconds=${DEVICE_SAFETY_JWT_LIFETIME_SECONDS:30}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
spring.task.scheduling.pool.size=2
