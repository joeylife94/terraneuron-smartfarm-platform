spring.application.name=terra-sense
server.port=8081

# Kafka Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Kafka Topics
kafka.topic.raw-sensor-data=raw-sensor-data

# Redis-backed shared command and device-state registries
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

# Device safety gate. TTL must remain greater than freshness so valid state is not removed early.
app.device-state.freshness-seconds=${DEVICE_STATE_FRESHNESS_SECONDS:120}
app.device-state.registry.ttl-seconds=${DEVICE_STATE_TTL_SECONDS:600}
app.device-state.reported-future-skew-seconds=${DEVICE_STATE_REPORTED_FUTURE_SKEW_SECONDS:10}

# Terra-Ops -> Terra-Sense service JWT. This secret is separate from user JWT and Cortex -> Ops auth.
device-safety.service-auth.jwt.secret=${DEVICE_SAFETY_JWT_SECRET}
device-safety.service-auth.jwt.issuer=${DEVICE_SAFETY_JWT_ISSUER:terraneuron-internal}
device-safety.service-auth.jwt.audience=${DEVICE_SAFETY_JWT_AUDIENCE:terra-sense}
device-safety.service-auth.jwt.allowed-subject=${DEVICE_SAFETY_JWT_SUBJECT:terra-ops}
device-safety.service-auth.jwt.clock-skew-seconds=${DEVICE_SAFETY_JWT_CLOCK_SKEW_SECONDS:5}
device-safety.service-auth.jwt.max-lifetime-seconds=${DEVICE_SAFETY_JWT_MAX_LIFETIME_SECONDS:60}

# MQTT Configuration
mqtt.broker.url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.client.id=terra-sense-${random.uuid}
mqtt.topic.sensor-data=terra/sensors/+/+/data
mqtt.topic.device-status=terra/devices/+/+/status
mqtt.qos=${MQTT_QOS:1}
mqtt.connect.timeout=10
mqtt.keepalive=60
mqtt.auto-reconnect=true
mqtt.sensor-ingest.enabled=${MQTT_SENSOR_INGEST:true}

# InfluxDB Configuration
influxdb.url=${INFLUXDB_URL:http://localhost:8086}
influxdb.token=${INFLUXDB_TOKEN:terra-token-2025}
influxdb.org=${INFLUXDB_ORG:terraneuron}
influxdb.bucket=${INFLUXDB_BUCKET:sensor_data}

# HTTP Ingestion API
api.ingestion.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
