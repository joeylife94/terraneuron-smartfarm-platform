services:
  redis:
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --requirepass
      - ${REDIS_PASSWORD:-local-dev}
    volumes:
      - redis-data:/data

  kafka:
    environment:
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  mysql:
    volumes:
      - ./infra/mysql/command_outbox.sql:/docker-entrypoint-initdb.d/20-command-outbox.sql

  terra-gateway:
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-local-dev}

  terra-sense:
    build:
      context: .
      dockerfile: services/terra-sense/Dockerfile
    depends_on:
      - redis
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-local-dev}

  terra-cortex:
    environment:
      KAFKA_TRANSACTIONAL_ID: terra-cortex-local
      KAFKA_DLT_TOPIC: raw-sensor-data.DLT
      KAFKA_PROCESSING_MAX_ATTEMPTS: 3
      KAFKA_MAX_POLL_INTERVAL_MS: 900000
      SERVICE_AUTH_JWT_SECRET: ${SERVICE_AUTH_JWT_SECRET:-local-service-auth-key-change-me-32-bytes}
      SERVICE_AUTH_JWT_ISSUER: terraneuron-internal
      SERVICE_AUTH_JWT_AUDIENCE: terra-ops
      SERVICE_AUTH_SUBJECT: terra-cortex
      SERVICE_AUTH_SCOPE: crop:read
      SERVICE_AUTH_TOKEN_TTL_SECONDS: 60

  terra-ops:
    build:
      context: .
      dockerfile: services/terra-ops/Dockerfile
    environment:
      SERVICE_AUTH_JWT_SECRET: ${SERVICE_AUTH_JWT_SECRET:-local-service-auth-key-change-me-32-bytes}
      SERVICE_AUTH_JWT_ISSUER: terraneuron-internal
      SERVICE_AUTH_JWT_AUDIENCE: terra-ops
      SERVICE_AUTH_ALLOWED_SUBJECT: terra-cortex

volumes:
  redis-data:
