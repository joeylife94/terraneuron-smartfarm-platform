name: Security Scan

on:
  schedule:
    # Changing the cron also reactivates schedules disabled after repository inactivity.
    # Avoid the top of the hour, when GitHub-hosted schedules can be delayed.
    - cron: '17 3 * * 1'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v7

      - name: 🧪 Validate Security Scan Policy
        run: python tests/test_security_scan_policy.py

      # Keep the complete report non-blocking so every detected severity reaches
      # GitHub code scanning, including vulnerabilities without an available fix.
      - name: 🔍 Generate Complete Trivy SARIF Report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          ignore-unfixed: false
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'

      - name: 📊 Upload Trivy Results to GitHub Security
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      # The reporting scan installs the pinned Trivy binary. Run the enforcement
      # pass separately so a gate failure cannot prevent the SARIF upload above.
      - name: 🚫 Enforce Fixable High and Critical Vulnerability Gate
        if: always()
        run: >-
          trivy fs
          --scanners vuln
          --ignore-unfixed
          --severity HIGH,CRITICAL
          --exit-code 1
          --format table
          .
