name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, 'integration/**' ]

permissions:
  contents: read
  packages: write

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_USERNAME: ${{ github.repository_owner }}

jobs:
  # ========== Java 서비스 빌드 & 테스트 ==========
  build-java-services:
    name: Build Java Services (terra-sense, terra-ops)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [terra-sense, terra-ops]
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
        
      - name: 🏗️ Build with Gradle
        working-directory: services/${{ matrix.service }}
        run: gradle build --no-daemon
          
      - name: 🧪 Run Tests
        working-directory: services/${{ matrix.service }}
        run: gradle test --no-daemon
          
      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: services/${{ matrix.service }}/build/test-results/

  # ========== Python 서비스 빌드 & 테스트 ==========
  build-python-service:
    name: Build Python Service (terra-cortex)
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          cd services/terra-cortex
          pip install -r requirements.txt
          pip install pytest pytest-cov
          
      - name: 🔍 Lint with Flake8
        run: |
          pip install flake8
          cd services/terra-cortex
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
          
      - name: 🧪 Run Tests
        shell: bash
        run: |
          cd services/terra-cortex
          set +e
          set -o pipefail
          pytest --cov=src --cov-report=xml --junitxml=pytest-results.xml 2>&1 | tee pytest-output.log
          test_status=${PIPESTATUS[0]}
          set -e

          if [ "${test_status}" -eq 5 ]; then
            echo "::warning::No terra-cortex tests were collected"
            exit 0
          fi

          exit "${test_status}"

      - name: 📊 Upload Python Test Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-terra-cortex
          if-no-files-found: error
          path: |
            services/terra-cortex/pytest-output.log
            services/terra-cortex/pytest-results.xml
            services/terra-cortex/coverage.xml

  # ========== Docker 이미지 빌드 & 푸시 ==========
  build-and-push-images:
    name: Build & Push Docker Images
    needs: [build-java-services, build-python-service]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service: [terra-sense, terra-cortex, terra-ops]
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/terraneuron-${{ matrix.service }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/terraneuron-${{ matrix.service }}:${{ github.sha }}

  # ========== E2E 테스트 ==========
  e2e-test:
    name: E2E Integration Test
    needs: [build-java-services, build-python-service]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      JWT_SECRET: DEMO_ONLY_E2E_CI_JWT_SECRET_32_CHARS_MIN
      E2E_POLL_TIMEOUT_SECONDS: '90'
      E2E_POLL_INTERVAL_SECONDS: '2'
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔎 Validate Docker Compose Configuration
        run: docker compose config --quiet

      - name: 🐳 Start Docker Compose Stack
        run: docker compose up -d

      - name: ⏳ Wait for Services
        shell: bash
        run: |
          wait_for_service() {
            local service="$1"
            local url="$2"

            echo "Waiting for ${service} at ${url}"
            for attempt in {1..60}; do
              if curl --fail --silent --show-error --max-time 5 "${url}" > /dev/null; then
                echo "${service} is ready"
                return 0
              fi
              sleep 5
            done

            echo "${service} did not become ready"
            docker compose logs --tail=100 "${service}"
            return 1
          }

          wait_for_service terra-sense http://localhost:8081/actuator/health
          wait_for_service terra-cortex http://localhost:8082/health
          wait_for_service terra-ops http://localhost:8080/actuator/health
          wait_for_service terra-gateway http://localhost:8000/actuator/health

      - name: 🐍 Setup Python for E2E Tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Test Dependencies
        run: pip install requests

      - name: 🔎 Validate E2E Test Syntax
        run: python -m py_compile tests/neural-flow-test.py

      - name: 🧪 Run E2E Tests
        shell: bash
        run: |
          set -o pipefail
          python tests/neural-flow-test.py 2>&1 | tee e2e-test-output.log

      - name: 🧾 Capture E2E Diagnostics
        if: always()
        shell: bash
        run: |
          docker compose ps --all > e2e-compose-ps.txt 2>&1 || true
          docker compose logs --no-color > e2e-compose.log 2>&1 || true

      - name: 📦 Upload E2E Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          if-no-files-found: error
          retention-days: 7
          path: |
            e2e-test-output.log
            e2e-compose-ps.txt
            e2e-compose.log

      - name: 🛑 Stop Docker Compose
        if: always()
        run: docker compose down -v
