name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, 'integration/**' ]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_USERNAME: ${{ github.repository_owner }}

jobs:
  # ========== Dependency security scan ==========
  dependency-security-scan:
    name: Dependency Security Scan
    uses: ./.github/workflows/security-scan.yml

  # ========== Java 서비스 빌드 & 테스트 ==========
  build-java-services:
    name: Build Java Services (terra-sense, terra-ops)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [terra-sense, terra-ops]

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: 🏗️ Build with Gradle
        working-directory: services/${{ matrix.service }}
        shell: bash
        run: |
          set +e
          set -o pipefail
          gradle build --no-daemon --stacktrace 2>&1 | tee gradle-build.log
          build_status=${PIPESTATUS[0]}
          set -e
          exit "${build_status}"

      - name: 🧪 Run Tests
        working-directory: services/${{ matrix.service }}
        run: gradle test --no-daemon

      - name: 📊 Upload Java Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          if-no-files-found: warn
          path: |
            services/${{ matrix.service }}/gradle-build.log
            services/${{ matrix.service }}/build/test-results/
            services/${{ matrix.service }}/build/reports/tests/

  # ========== Python 서비스 빌드 & 테스트 ==========
  build-python-service:
    name: Build Python Service (terra-cortex)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          cd services/terra-cortex
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: 🔍 Lint with Flake8
        run: |
          pip install flake8
          cd services/terra-cortex
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: 🧪 Run Tests
        shell: bash
        run: |
          cd services/terra-cortex
          set +e
          set -o pipefail
          pytest --cov=src --cov-report=xml --junitxml=pytest-results.xml 2>&1 | tee pytest-output.log
          test_status=${PIPESTATUS[0]}
          set -e

          if [ "${test_status}" -eq 5 ]; then
            echo "::warning::No terra-cortex tests were collected"
            exit 0
          fi

          exit "${test_status}"

      - name: 📊 Upload Python Test Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-terra-cortex
          if-no-files-found: error
          path: |
            services/terra-cortex/pytest-output.log
            services/terra-cortex/pytest-results.xml
            services/terra-cortex/coverage.xml

  # ========== Docker 이미지 빌드 & 푸시 ==========
  build-and-push-images:
    name: Build & Push Docker Images
    needs: [build-java-services, build-python-service]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: terra-sense
            context: .
            dockerfile: ./services/terra-sense/Dockerfile
          - service: terra-cortex
            context: ./services/terra-cortex
            dockerfile: ./services/terra-cortex/Dockerfile
          - service: terra-ops
            context: .
            dockerfile: ./services/terra-ops/Dockerfile

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/terraneuron-${{ matrix.service }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/terraneuron-${{ matrix.service }}:${{ github.sha }}

  # ========== E2E 테스트 ==========
  e2e-test:
    name: E2E Integration Test
    needs: [build-java-services, build-python-service]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      JWT_SECRET: DEMO_ONLY_E2E_CI_JWT_SECRET_32_CHARS_MIN
      E2E_POLL_TIMEOUT_SECONDS: '90'
      E2E_POLL_INTERVAL_SECONDS: '2'

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔎 Validate Docker Compose Configuration
        run: docker compose config --quiet

      - name: 🔔 Validate Prometheus Rules
        run: |
          docker run --rm --entrypoint /bin/promtool \
            -v "${{ github.workspace }}/infra/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v2.48.0 \
            check rules /etc/prometheus/alerts.yml

      - name: 🐳 Start Docker Compose Stack
        run: docker compose up -d --build

      - name: ⏳ Wait for Services
        run: |
          chmod +x scripts/ci/wait-for-services.sh
          scripts/ci/wait-for-services.sh

      - name: 🧪 Run E2E Test
        run: |
          chmod +x scripts/ci/e2e-test.sh
          scripts/ci/e2e-test.sh

      - name: 📋 Show Container Status
        if: always()
        run: docker compose ps

      - name: 🧾 Collect Docker Logs
        if: always()
        run: docker compose logs --no-color > docker-compose.log

      - name: 📊 Upload E2E Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          if-no-files-found: warn
          path: docker-compose.log

      - name: 🧹 Stop Docker Compose Stack
        if: always()
        run: docker compose down -v --remove-orphans
